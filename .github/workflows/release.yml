name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm build

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Calculate SHA256
        id: sha256
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARM64_FILE="release/Virtual Host Manager-${VERSION}-arm64.dmg"
          X64_FILE="release/Virtual Host Manager-${VERSION}.dmg"
          echo "SHA256_ARM64=$(shasum -a 256 "$ARM64_FILE" | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "SHA256_X64=$(shasum -a 256 "$X64_FILE" | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update Homebrew Tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          SHA256_ARM64: ${{ steps.sha256.outputs.SHA256_ARM64 }}
          SHA256_X64: ${{ steps.sha256.outputs.SHA256_X64 }}
          GITHUB_USERNAME: outscoper
        run: |
          git clone "https://${TAP_GITHUB_TOKEN}@github.com/outscoper/homebrew-localhost-mapper.git" tap
          cd tap
          cat > Casks/localhost-mapper.rb << CASK
          cask "localhost-mapper" do
            version "${VERSION}"

            on_arm do
              sha256 "${SHA256_ARM64}"
              url "https://github.com/outscoper/localhost-mapper/releases/download/v#{version}/Virtual-Host-Manager-#{version}-arm64.dmg"
            end

            on_intel do
              sha256 "${SHA256_X64}"
              url "https://github.com/outscoper/localhost-mapper/releases/download/v#{version}/Virtual-Host-Manager-#{version}.dmg"
            end

            name "Virtual Host Manager"
            desc "Map localhost ports to custom domains using Apache reverse proxy"
            homepage "https://github.com/outscoper/localhost-mapper"

            app "Virtual Host Manager.app"

            postflight do
              system_command "/usr/bin/xattr",
                args: ["-dr", "com.apple.quarantine", "#{appdir}/Virtual Host Manager.app"],
                sudo: false
            end
          end
          CASK
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add Casks/localhost-mapper.rb
          git commit -m "chore: update localhost-mapper to v${VERSION}"
          git push
